
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System Animation</title>
  <link rel="stylesheet" href="solar.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="stars"></div>

  <section class="hero">
    <div class="content">
      <h1>Solar System</h1>
    </div>

    <div class="solar-system">
      <div class="sun"></div>

      <div class="orbit orbit-mercury">
        <div class="planet mercury"></div>
      </div>

      <div class="orbit orbit-venus">
        <div class="planet venus"></div>
      </div>

      <div class="orbit orbit-earth">
        <div class="planet earth">
          <div class="moon-orbit">
            <div class="moon"></div>
          </div>
        </div>
      </div>

      <div class="orbit orbit-mars">
        <div class="planet mars"></div>
      </div>

      <div class="orbit orbit-jupiter">
        <div class="planet jupiter"></div>
      </div>

      <div class="orbit orbit-saturn">
        <div class="planet saturn">
          <div class="ring"></div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
