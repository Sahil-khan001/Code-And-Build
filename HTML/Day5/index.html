        <tbody>

                <td>Hitesh</td>

            </tr>
            <tr>
                <td>Sharique</td>

            </tr>
            <tr>
                <td>Sahil</td>
                <td>50000</td>

            </tr>
        </tbody>
    </table>
</body>
</html>
